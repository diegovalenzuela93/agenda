apiVersion: apps/v1
kind: Deployment
metadata:
    name: agenda
    namespace: agenda
spec:
    replicas: 1
    selector:
        matchLabels:
            app: agenda
    template:
        metadata:
            labels:
                app: agenda
        spec:
            containers:
                - name: agenda
                  image: ghcr.io/diegovalenzuela93/agenda:latest
                  imagePullPolicy: IfNotPresent
                  ports:
                      - containerPort: 8080
                  env:
                      - name: DATABASE_URL
                        valueFrom:
                            secretKeyRef:
                                name: agenda-secret
                                key: DATABASE_URL
                      - name: GIN_MODE
                        value: release
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 8080
                      initialDelaySeconds: 5
                      periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
    name: agenda
    namespace: agenda
spec:
    type: LoadBalancer
    selector:
        app: agenda
    ports:
        - port: 8080
          targetPort: 8080
